services:
  predict-mm:
    build: .
    command: ["python", "-m", "predict_mm.web", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.toml:/app/config.toml
      - ./.env:/app/.env
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:8080:8080"
