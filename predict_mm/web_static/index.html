<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Predict.fun 自动挂单机器人</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">PREDICT.FUN</p>
          <h1>自动挂单控制台</h1>
          <p class="subtitle">先模拟，再实盘。私钥只保存在这台服务器。</p>
        </div>
        <div id="mode-badge" class="badge">正在检查配置</div>
      </header>

      <section class="dashboard" aria-label="机器人状态">
        <article><span>状态</span><strong id="run-status">未配置</strong></article>
        <article><span>已配置市场</span><strong id="market-value">—</strong></article>
        <article><span>交易方向</span><strong id="outcome-value">—</strong></article>
        <article><span>单次数量</span><strong id="size-value">—</strong></article>
      </section>

      <section id="notice" class="notice" hidden></section>

      <section class="card controls">
        <div>
          <h2>运行控制</h2>
          <p>启动前请确认当前模式和市场信息。</p>
        </div>
        <div class="button-row">
          <button id="start-button" class="primary">启动机器人</button>
          <button id="stop-button" class="secondary">停止并撤单</button>
          <button id="cancel-button" class="danger">撤销所有市场订单</button>
        </div>
      </section>

      <section class="card">
        <div class="section-heading">
          <div>
            <h2>首次配置 / 修改配置</h2>
            <p>密钥输入框留空时，会保留已经保存的值。</p>
          </div>
          <span id="secret-status" class="muted"></span>
        </div>
        <form id="setup-form">
          <div class="market-section">
            <div class="section-heading">
              <div>
                <h3>做市市场</h3>
                <p>每个市场可单独选择 YES / NO 与单次挂单数量；保存后会同时运行。</p>
              </div>
              <button id="add-market-button" class="secondary" type="button">+ 添加市场</button>
            </div>
            <div id="markets-list" class="market-list"></div>
          </div>

          <div class="form-grid">
            <label>单市场最大仓位<input name="max_position_per_market" inputmode="decimal" value="10.0" required /></label>
            <label>总最大仓位<input name="max_total_position" inputmode="decimal" value="50.0" required /></label>
            <label><span class="label-with-help">撤单等待秒数 <span class="tooltip" tabindex="0" aria-label="查看撤单等待秒数说明">?<span class="tooltip-text" role="tooltip">每笔挂单最多保留多久。到达这个时间后，机器人会撤单并根据最新盘口重新报价。首次建议保持 8 秒。</span></span></span><input name="cancel_after_seconds" inputmode="decimal" value="8" required /></label>
          </div>

          <label class="switch"><input type="checkbox" name="dry_run" /><span>使用模拟运行（不会真实下单）</span></label>
          <label class="switch warning-switch"><input type="checkbox" name="emergency_exit_on_buy_fill" checked /><span class="label-with-help">买单被吃单后，立即以 0.01 紧急卖出 <span class="tooltip" tabindex="0" aria-label="查看紧急卖出说明">?<span class="tooltip-text" role="tooltip">实盘专用。买单被吃单（包括部分成交）时，机器人会撤掉该市场其他订单、停止继续报价，并以 0.01 的非 post-only 卖单卖出已成交数量。这可能会造成损失，仅在你明确接受此风险时开启。</span></span></span></label>

          <details>
            <summary>实盘和高级选项</summary>
            <p class="details-note">只有关闭模拟运行、准备实盘时才需要填写。请勿把这些信息发送给任何人。</p>
            <div class="form-grid">
              <label>API Key<input name="api_key" type="password" autocomplete="off" placeholder="留空则不修改" /></label>
              <label>JWT Token<input name="jwt_token" type="password" autocomplete="off" placeholder="留空则不修改" /></label>
              <label>钱包 Private Key<input name="private_key" type="password" autocomplete="off" placeholder="留空则不修改" /></label>
              <label>Predict Account Address<input name="predict_account_address" placeholder="公开钱包地址" /></label>
              <label>日志级别<select name="log_level"><option>INFO</option><option>DEBUG</option><option>WARNING</option><option>ERROR</option></select></label>
            </div>
          </details>
          <button class="primary" type="submit">保存配置</button>
        </form>
      </section>

      <section class="card logs-card">
        <div class="section-heading"><div><h2>运行日志</h2><p>每 2 秒自动刷新。</p></div><button id="refresh-logs" class="text-button">刷新</button></div>
        <pre id="logs">等待日志…</pre>
      </section>
    </main>
    <template id="market-template">
      <article class="market-row">
        <div class="market-row-heading">
          <strong class="market-title">市场</strong>
          <button class="text-button remove-market" type="button">移除</button>
        </div>
        <div class="form-grid">
          <label>Market ID<input data-field="market_id" required placeholder="要运行的市场 ID" /></label>
          <label>交易方向<select data-field="outcome"><option>YES</option><option>NO</option></select></label>
          <label>单次挂单数量<input data-field="quote_size" inputmode="decimal" value="1.0" required /></label>
        </div>
      </article>
    </template>
    <script src="/static/app.js"></script>
  </body>
</html>
